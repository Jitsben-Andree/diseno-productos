location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    # Intenta cargar el archivo, si no existe, redirige a index.html (Magia de Angular)
    try_files $uri$uri/ /index.html;
}

# Desactivar logs para archivos estáticos comunes
location ~* \.(?:css|js|jpg|svg|png|jpeg|ico|woff2?|eot|ttf|otf|map)$ {
    root /usr/share/nginx/html;
    expires 1y;
    access_log off;
    add_header Cache-Control "public";
}


