<div class="flex h-screen w-full bg-gris-fondo overflow-hidden">
  
  <!-- Overlay oscuro para móvil cuando el sidebar está abierto -->
  <div *ngIf="sidebarService.isOpen$ | async" 
       (click)="sidebarService.close()"
       class="lg:hidden fixed inset-0 bg-black/50 z-20 transition-opacity"></div>

  <!-- Sidebar: Fijo en escritorio, Overlay en móvil -->
  <div [class]="(sidebarService.isOpen$ | async) ? 'fixed inset-y-0 left-0 z-30 translate-x-0' : '-translate-x-full lg:translate-x-0'"
       class="fixed lg:relative transition-transform duration-300 ease-in-out h-full shadow-2xl">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Contenido Principal -->
  <div class="flex flex-col flex-1 overflow-hidden">
    <app-topbar></app-topbar>
    <main class="flex-1 overflow-y-auto p-4 md:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
