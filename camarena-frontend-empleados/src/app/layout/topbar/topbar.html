<!-- Hanan wamp'una (Barra superior Glassmorphism) -->
<header class="bg-[#070708]/70 backdrop-blur-xl h-20 border-b border-white/5 flex items-center justify-between px-8 z-20 sticky top-0">
  
  <!-- Lluq'i law (Título de la vista actual) -->
  <div>
    <h1 class="text-xl font-bold text-white tracking-tight">Ruwaykuna <span class="text-gray-500 font-normal text-sm ml-2 hidden sm:inline-block">/ Panel de Control</span></h1>
  </div>

  <!-- Paña law (Perfil y Cerrar Sesión) -->
  <div class="flex items-center space-x-6">
    
    <!-- Ruraqpa sutin (Nombre del Usuario - Estilo Pill Premium) -->
    <div class="flex items-center space-x-3 bg-white/5 border border-white/10 rounded-full py-1.5 px-2 pr-4 transition-all hover:bg-white/10 cursor-pointer">
      <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#f05435] to-orange-400 flex items-center justify-center text-white shadow-inner">
        <i class="pi pi-user text-sm"></i>
      </div>
      <div class="flex flex-col">
        <span class="font-semibold text-sm text-white leading-none">Kamachiq</span>
        <span class="text-[10px] text-[#f05435] font-bold tracking-wider uppercase mt-0.5">Admin</span>
      </div>
    </div>

    <!-- Divisor vertical -->
    <div class="h-8 w-px bg-white/10"></div>

    <!-- Lluqsiy ñit'ina (Botón de Cerrar Sesión) -->
    <button (click)="lluqsiy()" class="group flex items-center text-gray-400 hover:text-white transition-colors px-2 py-1 rounded">
      <div class="p-2 rounded-lg group-hover:bg-red-500/10 group-hover:text-red-400 transition-all mr-2">
        <i class="pi pi-power-off"></i>
      </div>
      <span class="text-sm font-medium hidden sm:block">Lluqsiy</span>
    </button>
  </div>

</header>
