<div class="min-h-screen flex items-center justify-center bg-gris-fondo relative overflow-hidden font-sans">
  
  <!-- Decoración de fondo clínica abstracta (Opcional, le da un toque moderno) -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-azul-clinico rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-verde-esmeralda rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>

  <!-- Contenedor Principal (Tarjeta Glassmorphism) -->
  <div class="max-w-md w-full bg-white/95 backdrop-blur-md rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] p-8 sm:p-10 relative z-10 border border-white">
    
    <!-- Encabezado con Logo UI -->
    <div class="text-center mb-8">
      <div class="mx-auto w-16 h-16 bg-azul-clinico/10 rounded-2xl flex items-center justify-center mb-4 border border-azul-clinico/20 shadow-sm">
        <i class="pi pi-shield text-3xl text-azul-clinico"></i>
      </div>
      <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">Camarena <span class="text-azul-clinico">Digital</span></h2>
      <p class="text-sm text-gray-500 mt-2 font-medium">ERP Administrativo & Clínico</p>
    </div>

    <!-- Alerta de Error Dinámica -->
    <div *ngIf="mensajeError" class="mb-6 p-4 bg-rojo-alerta/10 border-l-4 border-rojo-alerta text-rojo-alerta rounded-r-lg text-sm flex items-start animate-fadeIn">
      <i class="pi pi-exclamation-triangle mt-0.5 mr-2"></i>
      <span class="font-medium">{{ mensajeError }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <!-- Campo Correo Electrónico -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1.5">Correo Corporativo</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="pi pi-envelope text-gray-400"></i>
          </div>
          <input 
            type="email" 
            formControlName="email"
            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-azul-clinico focus:border-transparent transition-all bg-gray-50/50 focus:bg-white"
            placeholder="usuario@camarena.com"
            [ngClass]="{'border-rojo-alerta focus:ring-rojo-alerta bg-red-50/50': f['email'].invalid && f['email'].touched}"
          >
        </div>
        <div *ngIf="f['email'].invalid && f['email'].touched" class="text-rojo-alerta text-xs mt-1.5 font-medium flex items-center">
          <i class="pi pi-info-circle mr-1"></i> Ingrese un formato de correo válido.
        </div>
      </div>

      <!-- Campo Contraseña -->
      <div>
        <div class="flex justify-between items-center mb-1.5">
          <label class="block text-sm font-bold text-gray-700">Contraseña de Acceso</label>
          <a href="#" class="text-xs font-bold text-azul-clinico hover:text-azul-clinico-light transition-colors">¿Olvidó su clave?</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <i class="pi pi-lock text-gray-400"></i>
          </div>
          <input 
            [type]="mostrarContrasena ? 'text' : 'password'" 
            formControlName="contrasena"
            class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-azul-clinico focus:border-transparent transition-all bg-gray-50/50 focus:bg-white"
            placeholder="••••••••"
            [ngClass]="{'border-rojo-alerta focus:ring-rojo-alerta bg-red-50/50': f['contrasena'].invalid && f['contrasena'].touched}"
          >
          <!-- Botón Ojo (Mostrar/Ocultar) -->
          <button 
            type="button" 
            (click)="toggleMostrarContrasena()" 
            class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-azul-clinico transition-colors focus:outline-none"
            title="Mostrar/Ocultar contraseña"
          >
            <i class="pi text-lg" [ngClass]="mostrarContrasena ? 'pi-eye-slash' : 'pi-eye'"></i>
          </button>
        </div>
        <div *ngIf="f['contrasena'].invalid && f['contrasena'].touched" class="text-rojo-alerta text-xs mt-1.5 font-medium flex items-center">
          <i class="pi pi-info-circle mr-1"></i> La contraseña es obligatoria (mín. 4 caracteres).
        </div>
      </div>

      <!-- Checkbox Recordarme -->
      <div class="flex items-center mt-2">
        <div class="flex items-center h-5">
          <input 
            type="checkbox" 
            formControlName="recordarme"
            id="recordarme"
            class="w-4 h-4 text-azul-clinico border-gray-300 rounded focus:ring-azul-clinico cursor-pointer"
          >
        </div>
        <div class="ml-2">
          <label for="recordarme" class="text-sm font-medium text-gray-600 cursor-pointer select-none">
            Mantener sesión iniciada
          </label>
        </div>
      </div>

      <!-- Botón de Submit (Ingreso) -->
      <button 
        type="submit" 
        [disabled]="loginForm.invalid || cargando"
        class="w-full bg-azul-clinico hover:bg-azul-clinico-light text-white font-bold py-3.5 px-4 rounded-xl disabled:opacity-60 disabled:cursor-not-allowed flex justify-center items-center transition-all shadow-lg shadow-azul-clinico/20 active:scale-[0.98] mt-2"
      >
        <span *ngIf="!cargando" class="flex items-center"><i class="pi pi-sign-in mr-2"></i> Ingresar al Sistema</span>
        <span *ngIf="cargando" class="flex items-center"><i class="pi pi-spinner pi-spin mr-2"></i> Validando credenciales...</span>
      </button>

    </form>

    <!-- Separador SSO (Redes Sociales/Institucionales) -->
    <div class="mt-8 relative">
      <div class="absolute inset-0 flex items-center" aria-hidden="true">
        <div class="w-full border-t border-gray-200"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-3 bg-white text-gray-500 font-medium">O ingresa mediante</span>
      </div>
    </div>

    <!-- Botones de SSO -->
    <div class="mt-6 grid grid-cols-2 gap-4">
      <button (click)="loginConSocial('Microsoft')" type="button" class="w-full flex items-center justify-center px-4 py-2.5 border border-gray-200 rounded-xl shadow-sm bg-white text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors active:scale-95">
        <i class="pi pi-microsoft text-blue-600 mr-2 text-lg"></i>
        Microsoft
      </button>
      <button (click)="loginConSocial('Google')" type="button" class="w-full flex items-center justify-center px-4 py-2.5 border border-gray-200 rounded-xl shadow-sm bg-white text-sm font-bold text-gray-700 hover:bg-gray-50 transition-colors active:scale-95">
        <i class="pi pi-google text-red-500 mr-2 text-lg"></i>
        Google
      </button>
    </div>

  </div>
  
  <!-- Pie de página corporativo -->
  <div class="absolute bottom-5 w-full text-center z-10">
    <p class="text-xs text-gray-500 font-semibold">© 2026 Laboratorio Clínico Camarena Padilla. Todos los derechos reservados.</p>
  </div>

</div>
