server:
  # Si Docker le inyecta un puerto, lo usa. Si no (en tu PC), usa el 8080.
  port: ${PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: camarena-backend

  # CONFIGURACIÓN DE BASE DE DATOS (PostgreSQL)
  datasource:
    # MAGIA DE DOCKER: Por defecto usa localhost (para tu PC). 
    # En el VPS, docker-compose.yml lo reemplazará por "postgres-db"
    url: ${DB_URL:jdbc:postgresql://localhost:5432/camarena_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:0102}
    driver-class-name: org.postgresql.Driver

  # CONFIGURACIÓN DE JPA / HIBERNATE
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true


# VARIABLES PERSONALIZADAS DEL LABORATORIO (Camarena Digital)
camarena:
