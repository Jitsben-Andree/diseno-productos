# ==============================================================
# CONFIGURACIÓN DEL SERVIDOR
# ==============================================================
server:
  port: ${PORT:8081}
  error:
    include-message: always

spring:
  application:
    name: camarena-backend

  # ==============================================================
  # CONFIGURACIÓN DE BASE DE DATOS (PostgreSQL)
  # ==============================================================
  datasource:
    # URL apuntando a la base de datos interna de Docker (postgres-db)
    url: ${DB_URL:jdbc:postgresql://postgres-db:5432/camarena_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:dkjvx90dkjvx90}
    driver-class-name: org.postgresql.Driver

  # ==============================================================
  # CONFIGURACIÓN DE JPA / HIBERNATE
  # ==============================================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ==============================================================
# VARIABLES PERSONALIZADAS DEL LABORATORIO (Camarena Digital)
# ==============================================================
camarena:
  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration-ms: ${JWT_EXPIRATION:86400000}

