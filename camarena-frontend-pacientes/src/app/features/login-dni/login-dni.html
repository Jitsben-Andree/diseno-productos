<div class="min-h-screen bg-gray-50 flex flex-col justify-center px-6 py-12 lg:px-8">
  
  <!-- Encabezado y Logo -->
  <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center">
    <!-- Reemplaza el src con la ruta real de tu logo -->
    <div class="mx-auto h-16 w-16 bg-blue-600 rounded-full flex items-center justify-center shadow-lg mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
      </svg>
    </div>
    <h2 class="mt-2 text-2xl font-bold leading-9 tracking-tight text-gray-900">
      Camarena Digital
    </h2>
    <p class="mt-1 text-sm text-gray-500">Portal de Resultados Médicos</p>
  </div>

  <!-- Contenedor del Formulario -->
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-sm">
    <div class="bg-white px-6 py-8 shadow-sm rounded-2xl border border-gray-100">
      <form class="space-y-6" (ngSubmit)="ingresar()">
        
        <!-- Input DNI -->
        <div>
          <label for="dni" class="block text-sm font-medium leading-6 text-gray-900">Documento de Identidad (DNI)</label>
          <div class="mt-2 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"></path>
              </svg>
            </div>
            <input id="dni" name="dni" type="text" [(ngModel)]="dni" placeholder="Ej. 72763151" required
              class="block w-full rounded-xl border-0 py-3 pl-10 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 transition-all">
          </div>
        </div>

        <!-- Input Ticket -->
        <div>
          <label for="ticket" class="block text-sm font-medium leading-6 text-gray-900">Número de Ticket</label>
          <div class="mt-2 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path>
              </svg>
            </div>
            <input id="ticket" name="ticket" type="text" [(ngModel)]="ticket" placeholder="Ej. TKT-ABC12" required
              class="block w-full rounded-xl border-0 py-3 pl-10 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-blue-600 sm:text-sm sm:leading-6 transition-all uppercase">
          </div>
        </div>

        <!-- Alerta de Error Reactiva -->
        <div *ngIf="mensajeError" class="rounded-lg bg-red-50 p-3 flex items-start animate-fade-in">
          <svg class="h-5 w-5 text-red-400 mt-0.5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <p class="text-sm text-red-700">{{ mensajeError }}</p>
        </div>

        <!-- Botón Principal -->
        <div>
          <button type="submit" [disabled]="cargando"
            class="flex w-full justify-center rounded-xl bg-blue-600 px-3 py-3.5 text-sm font-semibold leading-6 text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 disabled:opacity-70 disabled:cursor-not-allowed transition-all">
            
            <span *ngIf="!cargando">Ver mis Resultados</span>
            
            <!-- Spinner de Carga (Oculto por defecto) -->
            <svg *ngIf="cargando" class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span *ngIf="cargando">Validando...</span>
            
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
